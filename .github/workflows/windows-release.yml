name: Windows Release

# Fork-owned Windows builds of lem (webview + sdl2 frontends) for the
# yathxyz/scoop-yath private Scoop bucket.
# Adapted from upstream's Windows CD (removed upstream at
# 7f7a21a5 as "doesn't work properly") with two fixes: git deps are cloned at
# the SHAs pinned in qlfile.lock (upstream cloned default-branch HEADs), and
# the SBCL MSI picker matches x86-64 explicitly (upstream's regex now matches
# the arm64 MSI first).

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency: windows-release

jobs:
  build:
    name: Build lem.exe (webview) + lem-sdl2.exe
    runs-on: windows-latest
    steps:
      - name: Force LF line endings for all clones
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SBCL (x86-64 MSI)
        shell: pwsh
        run: |
          $rel = Invoke-RestMethod -Uri "https://api.github.com/repos/roswell/sbcl_bin/releases/latest" -Headers @{ "User-Agent" = "gh-actions" }
          $asset = $rel.assets | Where-Object { $_.name -match 'x86-64-windows.*\.msi$' } | Select-Object -First 1
          if (-not $asset) { throw "x86-64 Windows SBCL MSI not found in latest sbcl_bin release." }
          $msi = Join-Path $env:RUNNER_TEMP "sbcl.msi"
          Invoke-WebRequest $asset.browser_download_url -OutFile $msi
          Start-Process msiexec.exe -Wait -ArgumentList "/i `"$msi`" /qn /norestart"
          $sbcl = Get-Command sbcl.exe -ErrorAction SilentlyContinue
          if (-not $sbcl) {
            $sbclExe = Get-ChildItem "C:\Program Files\Steel Bank Common Lisp" -Recurse -Filter sbcl.exe -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $sbclExe) { throw "sbcl.exe not found after install." }
            echo ($sbclExe.DirectoryName) | Out-File -FilePath $env:GITHUB_PATH -Append
          }

      - name: Install Quicklisp (dist pinned to qlfile.lock)
        shell: pwsh
        run: |
          $lock = Get-Content qlfile.lock -Raw
          if ($lock -notmatch '(?s)\("quicklisp"\s*\..*?:version "([\d-]+)"') { throw "quicklisp dist version not found in qlfile.lock" }
          $dist = $Matches[1]
          Write-Host "Pinned quicklisp dist: $dist"
          Invoke-WebRequest https://beta.quicklisp.org/quicklisp.lisp -OutFile quicklisp.lisp
          & sbcl --non-interactive --load quicklisp.lisp `
                 --eval "(quicklisp-quickstart:install :dist-url `"http://beta.quicklisp.org/dist/quicklisp/$dist/distinfo.txt`")" `
                 --eval "(ql::without-prompting (ql:add-to-init-file))"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Install pinned UIOP (qlfile "ql uiop" -> 3.3.7)
        shell: pwsh
        run: |
          # SBCL's bundled UIOP lacks the uiop/cl package nickname that
          # lem-extension-manager references; the qlfile pins standalone
          # uiop 3.3.7 (see .qlot/dists/uiop/releases.txt for the hash).
          $dst = Join-Path $env:USERPROFILE "common-lisp"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          $tgz = Join-Path $env:RUNNER_TEMP "uiop.tgz"
          Invoke-WebRequest "http://beta.quicklisp.org/archive/uiop/2024-10-12/uiop-3.3.7.tgz" -OutFile $tgz
          $sha1 = (Get-FileHash $tgz -Algorithm SHA1).Hash.ToLower()
          if ($sha1 -ne "7599e81d10a94dd1c39af80e1f3aef74bdbffa90") { throw "uiop tarball sha1 mismatch: $sha1" }
          tar -xzf $tgz -C $dst
          if (-not (Test-Path (Join-Path $dst "uiop-3.3.7\uiop.asd"))) { throw "uiop extraction failed" }

      - name: Clone qlfile git deps at locked SHAs
        shell: pwsh
        run: |
          $dst = Join-Path $env:USERPROFILE "common-lisp"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          $lock = Get-Content qlfile.lock -Raw
          $pattern = '\("([^"]+)"\s*\.\s*\(:class qlot/source/git:source-git\s*:initargs \(:remote-url "([^"]+)"[^(]*?:version "git-([0-9a-f]+)"'
          $found = [regex]::Matches($lock, $pattern)
          if ($found.Count -eq 0) { throw "no git sources parsed from qlfile.lock" }
          foreach ($m in $found) {
            $name = $m.Groups[1].Value; $url = $m.Groups[2].Value; $sha = $m.Groups[3].Value
            $target = Join-Path $dst $name
            Write-Host "$name -> $sha"
            git -c core.autocrlf=false clone --quiet $url $target
            if ($LASTEXITCODE -ne 0) { throw "clone $name failed" }
            git -C $target checkout --quiet --detach $sha
            if ($LASTEXITCODE -ne 0) { throw "checkout $name@$sha failed" }
          }
          Write-Host "Cloned $($found.Count) pinned git deps."

      - name: Link repo into quicklisp local-projects
        shell: pwsh
        run: |
          $lp = Join-Path $env:USERPROFILE "quicklisp\local-projects"
          New-Item -ItemType Directory -Force -Path $lp | Out-Null
          cmd /c mklink /D "$lp\lem" "${{ github.workspace }}"
          if ($LASTEXITCODE -ne 0) { throw "mklink failed (needed so deploy's bin/ lands in the workspace)" }

      - name: Build lem (deploy-op)
        shell: pwsh
        run: |
          & sbcl --dynamic-space-size 4096 --non-interactive `
                 --eval "(require :asdf)" `
                 --eval "(asdf:load-system :uiop)" `
                 --eval "(assert (find-package :uiop/cl) () `"pinned uiop 3.3.7 not in effect`")" `
                 --eval "(ql:quickload :lem)" `
                 --eval "(asdf:make :lem)"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path "bin\lem.exe")) { throw "bin/lem.exe not produced" }
          Get-ChildItem bin | Format-Table Name, Length

      - name: Package webview build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path bin\* -DestinationPath dist\lem-windows.zip
          $hash = (Get-FileHash dist\lem-windows.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  lem-windows.zip" | Out-File -Encoding ascii -NoNewline dist\lem-windows.zip.sha256
          Write-Host "sha256: $hash"
          Remove-Item bin -Recurse -Force

      - name: Install SDL2 runtime DLLs (pinned)
        shell: pwsh
        run: |
          $dlls = Join-Path $env:RUNNER_TEMP "sdl2-dlls"
          New-Item -ItemType Directory -Force -Path $dlls | Out-Null
          $pins = @(
            @{ url = "https://github.com/libsdl-org/SDL/releases/download/release-2.32.10/SDL2-2.32.10-win32-x64.zip";
               sha256 = "6cf9706eefd0a4a06dc764007934d428afaf029fabdd408a9e646048c91e18fb" },
            @{ url = "https://github.com/libsdl-org/SDL_ttf/releases/download/release-2.24.0/SDL2_ttf-2.24.0-win32-x64.zip";
               sha256 = "8d72240aafc783d37d6cf960b1a2138e6ca4eb0c1b5b9a9e71ea299d1ef27ef9" },
            @{ url = "https://github.com/libsdl-org/SDL_image/releases/download/release-2.8.12/SDL2_image-2.8.12-win32-x64.zip";
               sha256 = "a85aa359f0d7cf0c7e0586deee464982e4433e63fba407911dd802459f967f5f" }
          )
          foreach ($p in $pins) {
            $zip = Join-Path $env:RUNNER_TEMP ([IO.Path]::GetFileName($p.url))
            Invoke-WebRequest $p.url -OutFile $zip
            $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
            if ($hash -ne $p.sha256) { throw "sha256 mismatch for $($p.url): $hash" }
            Expand-Archive $zip -DestinationPath (Join-Path $env:RUNNER_TEMP "sdl2-x") -Force
          }
          Copy-Item (Join-Path $env:RUNNER_TEMP "sdl2-x\*.dll") $dlls
          Get-ChildItem $dlls
          echo $dlls | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install libffi toolchain for cffi-libffi grovel (MSYS2)
        shell: pwsh
        run: |
          # sdl2-ttf depends on cffi-libffi, whose grovel step compiles C
          # against ffi.h and links libffi; use the runner's MSYS2 mingw64
          # toolchain so gcc, headers and libffi-8.dll are all consistent.
          C:\msys64\usr\bin\bash -lc "pacman -S --noconfirm --needed mingw-w64-x86_64-gcc mingw-w64-x86_64-libffi mingw-w64-x86_64-pkg-config"
          if ($LASTEXITCODE -ne 0) { throw "pacman install failed" }
          if (-not (Test-Path "C:\msys64\mingw64\include\ffi.h")) { throw "ffi.h not installed" }
          echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build lem-sdl2 (deploy-op)
        shell: pwsh
        run: |
          & sbcl --dynamic-space-size 4096 --non-interactive `
                 --eval "(require :asdf)" `
                 --eval "(asdf:load-system :uiop)" `
                 --eval "(assert (find-package :uiop/cl) () `"pinned uiop 3.3.7 not in effect`")" `
                 --eval "(ql:quickload :lem/sdl2)" `
                 --eval "(asdf:make :lem/sdl2)"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path "bin\lem-sdl2.exe")) { throw "bin/lem-sdl2.exe not produced" }
          if (-not (Test-Path "bin\SDL2.dll")) { throw "deploy did not bundle SDL2.dll" }
          Copy-Item -Recurse frontends\sdl2\resources bin\resources
          Get-ChildItem bin | Format-Table Name, Length

      - name: Package sdl2 build
        shell: pwsh
        run: |
          Compress-Archive -Path bin\* -DestinationPath dist\lem-sdl2-windows.zip
          $hash = (Get-FileHash dist\lem-sdl2-windows.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  lem-sdl2-windows.zip" | Out-File -Encoding ascii -NoNewline dist\lem-sdl2-windows.zip.sha256
          Write-Host "sha256: $hash"

      - name: Compute release tag
        id: ver
        shell: pwsh
        run: |
          $tag = "windows-v" + (Get-Date -Format "yyyyMMdd") + "." + $env:GITHUB_RUN_NUMBER
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Release tag: $tag"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Windows build ${{ steps.ver.outputs.tag }}
          prerelease: true
          generate_release_notes: false
          files: |
            dist/lem-windows.zip
            dist/lem-windows.zip.sha256
            dist/lem-sdl2-windows.zip
            dist/lem-sdl2-windows.zip.sha256
